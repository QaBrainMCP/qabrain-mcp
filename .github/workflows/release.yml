name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version (e.g. v1.2.3)'
        required: true
        default: 'v1.0.0'

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate version format
        run: node -e "const version = process.env.VERSION; const pattern = /^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$/; if (!pattern.test(version)) { console.error('Invalid version:', version); process.exit(1); } console.log('Version OK:', version);" 
        env:
          VERSION: ${{ github.event.inputs.version }}

      - name: Build package
        run: npm run build

      - name: Package release artifact
        run: npm pack

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: '*.tgz'
          if-no-files-found: error

      - name: Create release draft
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          draft: true
          generate_release_notes: true
          files: '*.tgz'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
